    <!-- KLAVIYO LIST INJECTION JS -->
    <script>
        const form = document.getElementById("footer-subscribe-form");
        const emailInput = document.getElementById("footer-subscribe-email");
        const message = document.getElementById("footer-subscribe-message");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            if (!email) {
                message.textContent = "Please enter an email address.";
                return;
            }

            try {
                window._klOnsite = window._klOnsite || [];
                window._klOnsite.push(["subscribe", {
                    list: "VAccAG",
                    profiles: [{ email: email }]
                }]);

                message.textContent = "Thank you for subscribing!";
                form.reset();
            } catch (err) {
                console.error("Klaviyo error:", err);
                message.textContent = "Something went wrong.";
            }
        });
    </script>
